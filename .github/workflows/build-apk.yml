name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Install Expo CLI
        run: npm install -g @expo/eas-cli expo-cli

      - name: Prebuild Android (generate native code)
        run: npx expo prebuild --platform android --clean --no-install

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -x lint
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          cp "$APK" aion-agent.apk
          echo "✅ APK: $APK"

      - name: Delete old release if exists
        run: |
          ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/latest-apk \
            | jq -r .id)
          if [ "$ID" != "null" ] && [ -n "$ID" ]; then
            curl -s -X DELETE -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
              "https://api.github.com/repos/${{ github.repository }}/releases/$ID"
            git tag -d latest-apk || true
            git push origin :latest-apk || true
          fi

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "AION Agent — Latest APK"
          body: |
            ## AION — Autonomous Local AI Agent 🤖

            ### تحميل مباشر
            ⬇️ Download `aion-agent.apk` below — built automatically from source.

            ### ميزات التطبيق
            - 🧠 Tree of Thought reasoning (تفكير موازي متعدد الفروع)
            - 🔄 ReAct Loop — حلقة تفكير + أدوات حقيقية
            - 💻 Terminal Linux حقيقي (يتصل بالـ backend)
            - 👁️ Vision — تحليل الصور والملفات
            - 📝 Code Editor — كتابة وتشغيل كود + رفع GitHub
            - 📁 File Upload — أي ملف بما فيه APK
            - 🤖 Offline LLM — Ollama + Phi-3 Mini بدون إنترنت

            ### طريقة التثبيت
            1. حمّل `aion-agent.apk`
            2. Android → Settings → Security → Unknown Sources: ON
            3. افتح الـ APK وثبّت
            4. بعد التشغيل: Config tab → ضع endpoint الـ Ollama
          files: aion-agent.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
