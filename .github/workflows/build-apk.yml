name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
          run_install: false
      - name: Install deps
        run: pnpm install
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_NO_DOTENV: 1
      - name: Gradle assembleDebug
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: /usr/local/lib/android/sdk
      - name: Find APK
        run: |
          find . -name "*.apk" ! -path "*/node_modules/*" 2>/dev/null
          cp android/app/build/outputs/apk/debug/app-debug.apk aion-agent.apk
          ls -lh aion-agent.apk
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: "AION Agent APK"
          body: |
            ## AION — Autonomous Local AI Agent
            حمّل aion-agent.apk وثبّته (Unknown Sources ON)
          files: aion-agent.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
